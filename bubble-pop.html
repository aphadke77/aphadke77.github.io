<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Pop!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      cursor: crosshair;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; }

    #ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      align-items: center;
      z-index: 10;
    }

    .stat {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 10px 22px;
      color: #fff;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.7;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      margin-top: 2px;
    }

    #combo-display {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 200, 50, 0.9);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 20;
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="ui">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Popped</div>
    <div class="stat-value" id="popped">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Combo</div>
    <div class="stat-value" id="combo">x1</div>
  </div>
</div>

<div id="combo-display"></div>

<div id="instructions">Click bubbles to pop them &bull; Fast pops build combos!</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- State ---
  let score   = 0;
  let popped  = 0;
  let combo   = 1;
  let lastPopTime = 0;
  const COMBO_WINDOW = 1200; // ms

  const scoreEl  = document.getElementById('score');
  const poppedEl = document.getElementById('popped');
  const comboEl  = document.getElementById('combo');
  const comboDisplay = document.getElementById('combo-display');

  // --- Bubble colours ---
  const PALETTES = [
    ['#ff6b6b', '#ff8e8e'],
    ['#ffd93d', '#ffe878'],
    ['#6bcb77', '#9be3a3'],
    ['#4d96ff', '#82b6ff'],
    ['#c77dff', '#e0a8ff'],
    ['#ff9f1c', '#ffbf69'],
    ['#2ec4b6', '#5de1d8'],
    ['#ff4d6d', '#ff85a1'],
  ];

  // --- Bubble class ---
  class Bubble {
    constructor() { this.reset(true); }

    reset(initial = false) {
      this.r   = 20 + Math.random() * 45;
      this.x   = this.r + Math.random() * (W - this.r * 2);
      this.y   = initial ? H + this.r + Math.random() * H
                         : H + this.r + Math.random() * 60;
      this.vx  = (Math.random() - 0.5) * 0.8;
      this.vy  = -(0.6 + Math.random() * 1.2);
      this.wobble = 0;
      this.wobbleSpeed = 0.02 + Math.random() * 0.03;
      const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
      this.color1 = pal[0];
      this.color2 = pal[1];
      this.opacity = 0.75 + Math.random() * 0.2;
      this.alive = true;
      this.popping = false;
      this.popProgress = 0;
      this.shine = { x: -0.3 + Math.random() * 0.2, y: -0.35 };
    }

    update() {
      if (this.popping) {
        this.popProgress += 0.07;
        if (this.popProgress >= 1) this.alive = false;
        return;
      }
      this.wobble += this.wobbleSpeed;
      this.x += this.vx + Math.sin(this.wobble) * 0.4;
      this.y += this.vy;
      if (this.y + this.r < 0) this.reset();
    }

    draw() {
      if (!this.alive) return;
      ctx.save();

      if (this.popping) {
        const p = this.popProgress;
        const scale = 1 + p * 0.5;
        ctx.globalAlpha = (1 - p) * this.opacity;
        ctx.translate(this.x, this.y);
        ctx.scale(scale, scale);
        ctx.translate(-this.x, -this.y);
      } else {
        ctx.globalAlpha = this.opacity;
      }

      // Body gradient
      const grad = ctx.createRadialGradient(
        this.x + this.r * this.shine.x,
        this.y + this.r * this.shine.y,
        this.r * 0.1,
        this.x, this.y, this.r
      );
      grad.addColorStop(0, '#ffffff55');
      grad.addColorStop(0.4, this.color1 + 'cc');
      grad.addColorStop(1,   this.color2 + '88');

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Rim
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Shine highlight
      ctx.beginPath();
      ctx.ellipse(
        this.x + this.r * this.shine.x,
        this.y + this.r * this.shine.y,
        this.r * 0.22, this.r * 0.13,
        -0.5, 0, Math.PI * 2
      );
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();

      ctx.restore();
    }

    contains(px, py) {
      return Math.hypot(px - this.x, py - this.y) <= this.r;
    }

    pop() {
      this.popping = true;
      this.popProgress = 0;
      spawnParticles(this.x, this.y, this.r, this.color1);
    }
  }

  // --- Particle class ---
  class Particle {
    constructor(x, y, color) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4;
      this.x  = x;
      this.y  = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 1;
      this.life = 1;
      this.decay = 0.025 + Math.random() * 0.035;
      this.r = 3 + Math.random() * 4;
      this.color = color;
    }

    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.life -= this.decay; }
    get alive() { return this.life > 0; }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // --- Score floaters ---
  class ScoreFloat {
    constructor(x, y, text) {
      this.x = x; this.y = y;
      this.vy = -1.8;
      this.life = 1;
      this.text = text;
    }

    update() { this.y += this.vy; this.life -= 0.022; }
    get alive() { return this.life > 0; }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      ctx.font = `bold ${18 + (1 - this.life) * 6}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#ffd93d';
      ctx.shadowBlur = 10;
      ctx.fillText(this.text, this.x, this.y);
      ctx.restore();
    }
  }

  function spawnParticles(x, y, r, color) {
    const count = Math.floor(r * 0.8);
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
  }

  // --- Init collections ---
  const BUBBLE_COUNT = 22;
  const bubbles   = Array.from({ length: BUBBLE_COUNT }, () => new Bubble());
  const particles = [];
  const floaters  = [];

  // --- Combo helpers ---
  let comboTimeout = null;
  function flashCombo(c) {
    if (c < 2) return;
    comboDisplay.textContent = `x${c} COMBO!`;
    comboDisplay.style.opacity = 1;
    clearTimeout(comboTimeout);
    comboTimeout = setTimeout(() => { comboDisplay.style.opacity = 0; }, 800);
  }

  // --- Click / tap handler ---
  function handlePop(ex, ey) {
    // Largest bubble on top (highest index drawn last) — check in reverse
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      if (b.alive && !b.popping && b.contains(ex, ey)) {
        b.pop();

        // Combo logic
        const now = Date.now();
        if (now - lastPopTime < COMBO_WINDOW) {
          combo = Math.min(combo + 1, 10);
        } else {
          combo = 1;
        }
        lastPopTime = now;

        const pts = Math.round(b.r * combo);
        score  += pts;
        popped += 1;

        scoreEl.textContent  = score;
        poppedEl.textContent = popped;
        comboEl.textContent  = `x${combo}`;

        floaters.push(new ScoreFloat(b.x, b.y - b.r, `+${pts}`));
        flashCombo(combo);

        // Respawn after pop animation
        setTimeout(() => {
          b.reset();
          b.alive = true;
        }, 400);

        return; // one bubble per click
      }
    }
    // Missed — reset combo
    combo = 1;
    comboEl.textContent = 'x1';
  }

  canvas.addEventListener('click', e => handlePop(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    handlePop(t.clientX, t.clientY);
  }, { passive: false });

  // --- Background stars ---
  const stars = Array.from({ length: 120 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.5 + Math.random() * 1.2,
    a: 0.3 + Math.random() * 0.5,
    tw: 0.005 + Math.random() * 0.02,
    phase: Math.random() * Math.PI * 2,
  }));

  // --- Main loop ---
  let frame = 0;
  function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);

    // Stars
    frame++;
    stars.forEach(s => {
      const alpha = s.a * (0.6 + 0.4 * Math.sin(frame * s.tw + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    // Bubbles
    bubbles.forEach(b => { b.update(); b.draw(); });

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (!particles[i].alive) particles.splice(i, 1);
    }

    // Floaters
    for (let i = floaters.length - 1; i >= 0; i--) {
      floaters[i].update();
      floaters[i].draw();
      if (!floaters[i].alive) floaters.splice(i, 1);
    }
  }
  loop();
</script>
</body>
</html>
