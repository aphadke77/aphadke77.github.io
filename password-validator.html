<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            border-radius: 16px; 
            padding: 40px; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 450px; 
        }
        h1 { 
            color: #1a1a2e; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 28px; 
        }
        .input-group { 
            margin-bottom: 25px; 
            position: relative; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #333; 
        }
        .password-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        input { 
            width: 100%; 
            padding: 14px 50px 14px 16px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: border-color 0.3s; 
        }
        input:focus { 
            outline: none; 
            border-color: #4f46e5; 
        }
        .toggle-password { 
            position: absolute; 
            right: 12px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            padding: 5px; 
            color: #666; 
            font-size: 14px; 
        }
        .toggle-password:hover { color: #4f46e5; }
        .strength-meter { 
            height: 8px; 
            background-color: #e5e7eb; 
            border-radius: 4px; 
            margin-top: 20px; 
            overflow: hidden; 
        }
        .strength-meter-fill { 
            height: 100%; 
            width: 0%; 
            border-radius: 4px; 
            transition: width 0.3s, background-color 0.3s; 
        }
        .strength-text { 
            font-weight: 600; 
            font-size: 16px; 
            margin-top: 10px; 
            text-align: center; 
        }
        .criteria-list { 
            list-style: none; 
            padding: 0; 
            margin-top: 20px; 
        }
        .criteria-list li { 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            color: #666; 
        }
        .criteria-list li .icon { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            margin-right: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            background-color: #e5e7eb; 
            color: #999; 
        }
        .criteria-list li.met { color: #10b981; }
        .criteria-list li.met .icon { 
            background-color: #10b981; 
            color: white; 
        }
        .nav-button { 
            display: inline-block; 
            padding: 10px 20px; 
            background-color: #4f46e5; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 500; 
            position: absolute;
            top: 20px;
            left: 20px;
            transition: background 0.3s;
        }
        .nav-button:hover { background-color: #4338ca; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-button">← Back to Home</a>
    <div class="container">
        <h1>Password Validator</h1>
        <div class="input-group">
            <label for="password">Enter Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" autocomplete="off" placeholder="Enter your password">
                <button type="button" class="toggle-password" id="toggleBtn">Show</button>
            </div>
        </div>
        <div class="strength-meter">
            <div class="strength-meter-fill" id="strength-meter-fill"></div>
        </div>
        <div class="strength-text" id="strength-text">Enter a password</div>
        <ul class="criteria-list">
            <li id="length-criteria"><span class="icon">✓</span>8+ characters</li>
            <li id="lowercase-criteria"><span class="icon">✓</span>Lowercase letter (a-z)</li>
            <li id="uppercase-criteria"><span class="icon">✓</span>Uppercase letter (A-Z)</li>
            <li id="number-criteria"><span class="icon">✓</span>Number (0-9)</li>
            <li id="special-criteria"><span class="icon">✓</span>Special character (!@#$%^&*)</li>
        </ul>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');
        const strengthMeter = document.getElementById('strength-meter-fill');
        const strengthText = document.getElementById('strength-text');

        const criteria = {
            length: { element: document.getElementById('length-criteria'), regex: /.{8,}/ },
            lowercase: { element: document.getElementById('lowercase-criteria'), regex: /[a-z]/ },
            uppercase: { element: document.getElementById('uppercase-criteria'), regex: /[A-Z]/ },
            number: { element: document.getElementById('number-criteria'), regex: /[0-9]/ },
            special: { element: document.getElementById('special-criteria'), regex: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/ }
        };

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        passwordInput.addEventListener('input', validatePassword);

        function validatePassword() {
            const password = passwordInput.value;
            let metCount = 0;

            for (const key in criteria) {
                const met = criteria[key].regex.test(password);
                criteria[key].element.classList.toggle('met', met);
                if (met) metCount++;
            }

            updateStrength(metCount, password.length);

            if (password.length === 0) {
                strengthText.textContent = 'Enter a password';
                strengthMeter.style.width = '0%';
                strengthMeter.style.backgroundColor = '#e5e7eb';
            }
        }

        function updateStrength(metCount, length) {
            const colors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e'];
            const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];

            if (length === 0) {
                strengthText.textContent = 'Enter a password';
                strengthMeter.style.width = '0%';
                return;
            }

            const width = (metCount / 5) * 100;
            strengthMeter.style.width = width + '%';
            strengthMeter.style.backgroundColor = colors[metCount - 1] || colors[0];
            strengthText.textContent = texts[metCount - 1] || texts[0];
            strengthText.style.color = colors[metCount - 1] || colors[0];
        }
    </script>
</body>
</html>
