<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Profile Builder</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --secondary: #2ecc71;
            --accent: #9b59b6;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --white: #ffffff;
            --text-dark: #333;
            --text-light: #666;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
        header p { color: rgba(255,255,255,0.75); font-size: 1rem; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            transition: var(--transition);
        }
        .back-link:hover { color: white; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 820px) {
            .container { grid-template-columns: 1fr; }
        }

        /* --- Left Panel: Input --- */
        .panel {
            background: var(--white);
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: var(--shadow-md);
        }

        .panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 1.4rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #e8ecf0;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.4rem;
        }

        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #dde3ea;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-dark);
            background: #fafbfc;
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
        }

        .proficiency-slider {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .slider-value {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            min-width: 80px;
            text-align: right;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            justify-content: center;
            margin-top: 0.4rem;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .btn-secondary {
            background: #f0f4f8;
            color: var(--text-dark);
        }
        .btn-secondary:hover { background: #e0e8f0; }

        .btn-danger {
            background: #fee;
            color: #e74c3c;
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
            border-radius: 6px;
        }
        .btn-danger:hover { background: #fdd; }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.2rem 0;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e4e8;
        }

        .upload-zone {
            border: 2px dashed #c8d6e5;
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #f8fafc;
        }
        .upload-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .upload-zone svg { opacity: 0.5; margin-bottom: 0.6rem; }
        .upload-zone p { font-size: 0.85rem; color: var(--text-light); }
        .upload-zone input { display: none; }

        .action-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.4rem;
        }

        /* --- Right Panel: Display --- */
        .display-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .toolbar {
            background: var(--white);
            border-radius: 12px;
            padding: 1rem 1.4rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .toolbar span { font-size: 0.85rem; color: var(--text-light); flex: 1; }

        .view-btns { display: flex; gap: 0.4rem; }
        .view-btn {
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            border: 1.5px solid #dde3ea;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .view-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .category-block {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .category-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-light);
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #e8ecf0;
        }

        /* Bar view */
        .skill-bar-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .skill-bar-item:last-child { margin-bottom: 0; }

        .skill-name {
            font-size: 0.88rem;
            font-weight: 500;
            min-width: 130px;
            color: var(--text-dark);
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: #e8ecf0;
            border-radius: 99px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s ease;
        }

        .skill-pct {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-light);
            min-width: 36px;
            text-align: right;
        }

        .skill-actions { display: flex; gap: 0.3rem; }

        /* Badge view */
        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .skill-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            border-radius: 99px;
            font-size: 0.82rem;
            font-weight: 600;
            border: 1.5px solid transparent;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* Level colors */
        .level-beginner   { background:#e8f5e9; color:#2e7d32; border-color:#a5d6a7; }
        .level-beginner .badge-dot, .fill-beginner   { background:#4caf50; }

        .level-intermediate { background:#e3f2fd; color:#1565c0; border-color:#90caf9; }
        .level-intermediate .badge-dot, .fill-intermediate { background:#2196f3; }

        .level-advanced  { background:#f3e5f5; color:#6a1b9a; border-color:#ce93d8; }
        .level-advanced .badge-dot, .fill-advanced  { background:#9c27b0; }

        .level-expert    { background:#fff8e1; color:#e65100; border-color:#ffcc80; }
        .level-expert .badge-dot, .fill-expert    { background:#ff9800; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
        .empty-state svg { opacity: 0.3; margin-bottom: 1rem; }
        .empty-state p { font-size: 0.95rem; }

        .export-row {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--dark);
            color: white;
            padding: 0.8rem 1.4rem;
            border-radius: 10px;
            font-size: 0.9rem;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        .summary-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .summary-chip {
            background: #f0f4f8;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.82rem;
            color: var(--text-dark);
        }
        .summary-chip strong { color: var(--primary); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Portfolio
    </a>
    <h1>Skills Profile Builder</h1>
    <p>Add your technical skills, set proficiency levels, and visualise your profile</p>
</header>

<div class="container">

    <!-- LEFT: Input Panel -->
    <aside class="panel">
        <h2>Add a Skill</h2>

        <div class="form-group">
            <label for="skillName">Skill Name</label>
            <input type="text" id="skillName" placeholder="e.g. Python, AWS, Kubernetes…">
        </div>

        <div class="form-group">
            <label for="skillCategory">Category</label>
            <select id="skillCategory">
                <option value="Programming Languages">Programming Languages</option>
                <option value="Cloud & DevOps">Cloud & DevOps</option>
                <option value="Data & Analytics">Data & Analytics</option>
                <option value="Databases">Databases</option>
                <option value="Frameworks & Libraries">Frameworks & Libraries</option>
                <option value="Tools & Platforms">Tools & Platforms</option>
                <option value="Soft Skills">Soft Skills</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Proficiency</label>
            <div class="proficiency-slider">
                <div class="slider-row">
                    <input type="range" id="proficiency" min="10" max="100" step="5" value="60">
                    <span class="slider-value" id="sliderLabel">Advanced (60%)</span>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="addSkill()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add Skill
        </button>

        <div class="divider">or import from file</div>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <svg width="32" height="32" fill="none" stroke="#3498db" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p><strong>Click to upload</strong> a .txt or .json skills file</p>
            <p style="margin-top:0.3rem;font-size:0.78rem;">Supports plain text (one skill per line) or JSON export</p>
            <input type="file" id="fileInput" accept=".txt,.json" onchange="importFile(event)">
        </div>

        <div class="action-row">
            <button class="btn btn-secondary" style="flex:1" onclick="clearAll()">Clear All</button>
            <button class="btn btn-secondary" style="flex:1" onclick="loadSample()">Load Sample</button>
        </div>
    </aside>

    <!-- RIGHT: Display Panel -->
    <div class="display-panel">

        <div class="toolbar">
            <span id="summaryText">No skills added yet.</span>
            <div class="view-btns">
                <button class="view-btn active" id="viewBar" onclick="setView('bar')">Bars</button>
                <button class="view-btn" id="viewBadge" onclick="setView('badge')">Badges</button>
            </div>
            <button class="btn btn-secondary" style="padding:0.45rem 0.9rem;font-size:0.8rem" onclick="exportJSON()">Export JSON</button>
            <button class="btn btn-secondary" style="padding:0.45rem 0.9rem;font-size:0.8rem" onclick="copyText()">Copy Text</button>
        </div>

        <div id="skillsDisplay"></div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let skills = [];
    let currentView = 'bar';

    const levelMap = [
        { max: 25,  label: 'Beginner',     cls: 'beginner' },
        { max: 50,  label: 'Intermediate', cls: 'intermediate' },
        { max: 75,  label: 'Advanced',     cls: 'advanced' },
        { max: 100, label: 'Expert',       cls: 'expert' },
    ];

    function getLevel(pct) {
        return levelMap.find(l => pct <= l.max) || levelMap[3];
    }

    const profInput = document.getElementById('proficiency');
    const sliderLabel = document.getElementById('sliderLabel');

    profInput.addEventListener('input', () => {
        const pct = parseInt(profInput.value);
        const lvl = getLevel(pct);
        sliderLabel.textContent = `${lvl.label} (${pct}%)`;
    });

    function addSkill() {
        const name = document.getElementById('skillName').value.trim();
        if (!name) { showToast('Please enter a skill name.'); return; }

        const category = document.getElementById('skillCategory').value;
        const pct = parseInt(profInput.value);

        if (skills.find(s => s.name.toLowerCase() === name.toLowerCase() && s.category === category)) {
            showToast('This skill is already in the list.');
            return;
        }

        skills.push({ name, category, pct });
        document.getElementById('skillName').value = '';
        render();
        showToast(`"${name}" added!`);
    }

    document.getElementById('skillName').addEventListener('keydown', e => {
        if (e.key === 'Enter') addSkill();
    });

    function removeSkill(index) {
        skills.splice(index, 1);
        render();
    }

    function setView(v) {
        currentView = v;
        document.getElementById('viewBar').classList.toggle('active', v === 'bar');
        document.getElementById('viewBadge').classList.toggle('active', v === 'badge');
        render();
    }

    function render() {
        const container = document.getElementById('skillsDisplay');

        if (skills.length === 0) {
            container.innerHTML = `
                <div class="category-block">
                    <div class="empty-state">
                        <svg width="48" height="48" fill="none" stroke="#3498db" stroke-width="1.5" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 8v4M12 16h.01"/>
                        </svg>
                        <p>No skills yet — add one on the left or load the sample set.</p>
                    </div>
                </div>`;
            document.getElementById('summaryText').textContent = 'No skills added yet.';
            return;
        }

        const categories = [...new Set(skills.map(s => s.category))];
        const html = categories.map(cat => {
            const catSkills = skills.filter(s => s.category === cat);
            const items = catSkills.map((s, localIdx) => {
                const globalIdx = skills.indexOf(s);
                const lvl = getLevel(s.pct);
                if (currentView === 'bar') {
                    return `
                        <div class="skill-bar-item">
                            <span class="skill-name">${escHtml(s.name)}</span>
                            <div class="bar-track">
                                <div class="bar-fill fill-${lvl.cls}" style="width:${s.pct}%"></div>
                            </div>
                            <span class="skill-pct">${s.pct}%</span>
                            <div class="skill-actions">
                                <button class="btn btn-danger" onclick="removeSkill(${globalIdx})" title="Remove">✕</button>
                            </div>
                        </div>`;
                } else {
                    return `
                        <span class="skill-badge level-${lvl.cls}">
                            <span class="badge-dot"></span>
                            ${escHtml(s.name)}
                            <button onclick="removeSkill(${globalIdx})" style="background:none;border:none;cursor:pointer;font-size:0.75rem;color:inherit;opacity:0.6;padding:0 0 0 2px" title="Remove">✕</button>
                        </span>`;
                }
            }).join('');

            const inner = currentView === 'badge'
                ? `<div class="badge-grid">${items}</div>`
                : items;

            return `
                <div class="category-block">
                    <div class="category-title">${escHtml(cat)}</div>
                    ${inner}
                </div>`;
        }).join('');

        container.innerHTML = html;

        const lvlCounts = levelMap.map(l => ({
            label: l.label,
            count: skills.filter(s => getLevel(s.pct).label === l.label).length
        })).filter(x => x.count > 0);

        const summary = lvlCounts.map(x => `<span class="summary-chip"><strong>${x.count}</strong> ${x.label}</span>`).join('');
        document.getElementById('summaryText').innerHTML =
            `<strong>${skills.length}</strong> skill${skills.length !== 1 ? 's' : ''} &nbsp;` + summary;
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function clearAll() {
        if (skills.length === 0) return;
        if (confirm('Remove all skills?')) { skills = []; render(); }
    }

    function loadSample() {
        skills = [
            { name: 'Python',       category: 'Programming Languages', pct: 90 },
            { name: 'SQL',          category: 'Programming Languages', pct: 85 },
            { name: 'JavaScript',   category: 'Programming Languages', pct: 65 },
            { name: 'Java',         category: 'Programming Languages', pct: 55 },
            { name: 'AWS',          category: 'Cloud & DevOps',        pct: 75 },
            { name: 'Docker',       category: 'Cloud & DevOps',        pct: 70 },
            { name: 'Git',          category: 'Tools & Platforms',     pct: 85 },
            { name: 'Apache Spark', category: 'Data & Analytics',      pct: 80 },
            { name: 'Pandas',       category: 'Frameworks & Libraries',pct: 90 },
            { name: 'PostgreSQL',   category: 'Databases',             pct: 75 },
            { name: 'Leadership',   category: 'Soft Skills',           pct: 85 },
            { name: 'Agile/Scrum',  category: 'Tools & Platforms',     pct: 80 },
        ];
        render();
        showToast('Sample skills loaded!');
    }

    function exportJSON() {
        if (skills.length === 0) { showToast('No skills to export.'); return; }
        const blob = new Blob([JSON.stringify(skills, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'skills.json';
        a.click();
        showToast('skills.json downloaded!');
    }

    function copyText() {
        if (skills.length === 0) { showToast('No skills to copy.'); return; }
        const categories = [...new Set(skills.map(s => s.category))];
        const text = categories.map(cat => {
            const lines = skills.filter(s => s.category === cat)
                .map(s => `  - ${s.name} (${getLevel(s.pct).label}, ${s.pct}%)`).join('\n');
            return `${cat}:\n${lines}`;
        }).join('\n\n');
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
    }

    function importFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                if (file.name.endsWith('.json')) {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        const valid = data.filter(s => s.name && s.category && typeof s.pct === 'number');
                        skills.push(...valid);
                        render();
                        showToast(`Imported ${valid.length} skill(s) from JSON.`);
                    } else {
                        showToast('Invalid JSON format. Expected an array.');
                    }
                } else {
                    const lines = e.target.result.split('\n').map(l => l.trim()).filter(Boolean);
                    const category = document.getElementById('skillCategory').value;
                    const newSkills = lines.map(name => ({ name, category, pct: 60 }));
                    skills.push(...newSkills);
                    render();
                    showToast(`Imported ${newSkills.length} skill(s) from text.`);
                }
            } catch {
                showToast('Could not parse file. Please check the format.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    render();
</script>
</body>
</html>
