<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    
    .container {
      background-color: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    .strength-meter {
      height: 10px;
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 5px;
      margin-top: 20px;
      overflow: hidden;
    }
    
    .strength-meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out;
    }
    
    .password-info {
      margin-top: 20px;
    }
    
    .strength-text {
      font-weight: 600;
      font-size: 18px;
      margin-top: 10px;
    }
    
    .criteria-list {
      list-style-type: none;
      padding: 0;
      margin-top: 15px;
    }
    
    .criteria-list li {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    
    .criteria-list li::before {
      content: "";
      display: inline-block;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      margin-right: 10px;
      background-color: #e0e0e0;
    }
    
    .criteria-list li.met::before {
      background-color: #4CAF50;
    }
    
    .toggle-password {
      position: relative;
      text-align: right;
      margin-top: -38px;
      margin-right: 10px;
      cursor: pointer;
      user-select: none;
    }
    
    .eye-icon {
      position: absolute;
      right: 0;
      display: inline-block;
      width: 24px;
      height: 24px;
      background-color: transparent;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Password Strength Checker</h1>
    
    <div class="input-group">
      <label for="password">Enter Password</label>
      <input type="password" id="password" autocomplete="off">
      <div class="toggle-password">
        <span id="togglePassword">Show</span>
      </div>
    </div>
    
    <div class="strength-meter">
      <div class="strength-meter-fill" id="strength-meter-fill"></div>
    </div>
    
    <div class="password-info">
      <div class="strength-text" id="strength-text">Password Strength: None</div>
      
      <ul class="criteria-list">
        <li id="length-criteria">8+ characters</li>
        <li id="lowercase-criteria">Lowercase letter</li>
        <li id="uppercase-criteria">Uppercase letter</li>
        <li id="number-criteria">Number</li>
        <li id="special-criteria">Special character</li>
        <li id="no-common-criteria">Not a common password</li>
      </ul>
    </div>
  </div>

  <script>
    // Common passwords to check against (simplified list)
    const commonPasswords = [
      "password", "123456", "qwerty", "admin", "welcome",
      "123456789", "12345678", "1234", "111111", "1234567",
      "dragon", "123123", "baseball", "abc123", "football",
      "monkey", "letmein", "shadow", "master", "666666",
      "qwertyuiop", "123321", "mustang", "1234567890", "superman",
      "password1", "michael", "654321", "batman", "trustno1"
    ];

    // DOM elements
    const passwordInput = document.getElementById('password');
    const strengthMeter = document.getElementById('strength-meter-fill');
    const strengthText = document.getElementById('strength-text');
    const lengthCriteria = document.getElementById('length-criteria');
    const lowercaseCriteria = document.getElementById('lowercase-criteria');
    const uppercaseCriteria = document.getElementById('uppercase-criteria');
    const numberCriteria = document.getElementById('number-criteria');
    const specialCriteria = document.getElementById('special-criteria');
    const noCommonCriteria = document.getElementById('no-common-criteria');
    const togglePassword = document.getElementById('togglePassword');

    // Toggle password visibility
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? 'Show' : 'Hide';
    });

    // Password strength checker
    passwordInput.addEventListener('input', checkPasswordStrength);

    function checkPasswordStrength() {
      const password = passwordInput.value;
      
      // Check criteria
      const hasLength = password.length >= 8;
      const hasLowerCase = /[a-z]/.test(password);
      const hasUpperCase = /[A-Z]/.test(password);
      const hasNumber = /[0-9]/.test(password);
      const hasSpecial = /[^A-Za-z0-9]/.test(password);
      const isNotCommon = !commonPasswords.includes(password.toLowerCase()) && password.length > 0;
      
      // Update criteria indicators
      updateCriteria(lengthCriteria, hasLength);
      updateCriteria(lowercaseCriteria, hasLowerCase);
      updateCriteria(uppercaseCriteria, hasUpperCase);
      updateCriteria(numberCriteria, hasNumber);
      updateCriteria(specialCriteria, hasSpecial);
      updateCriteria(noCommonCriteria, isNotCommon);
      
      // Calculate strength score (0-100)
      let score = 0;
      
      if (password.length > 0) {
        // Base points for length (up to 40 points)
        score += Math.min(40, password.length * 4);
        
        // Points for character variety (up to 50 points)
        if (hasLowerCase) score += 10;
        if (hasUpperCase) score += 10;
        if (hasNumber) score += 10;
        if (hasSpecial) score += 20;
        
        // Penalty for common password (up to -30 points)
        if (!isNotCommon) score -= 30;
        
        // Ensure score is between 0-100
        score = Math.max(0, Math.min(100, score));
      }
      
      // Update strength meter
      strengthMeter.style.width = score + '%';
      
      // Set color based on strength
      if (score >= 80) {
        strengthMeter.style.backgroundColor = '#4CAF50'; // Strong - Green
        strengthText.textContent = 'Password Strength: Strong';
        strengthText.style.color = '#4CAF50';
      } else if (score >= 60) {
        strengthMeter.style.backgroundColor = '#2196F3'; // Good - Blue
        strengthText.textContent = 'Password Strength: Good';
        strengthText.style.color = '#2196F3';
      } else if (score >= 40) {
        strengthMeter.style.backgroundColor = '#FF9800'; // Medium - Orange
        strengthText.textContent = 'Password Strength: Medium';
        strengthText.style.color = '#FF9800';
      } else if (score > 0) {
        strengthMeter.style.backgroundColor = '#F44336'; // Weak - Red
        strengthText.textContent = 'Password Strength: Weak';
        strengthText.style.color = '#F44336';
      } else {
        strengthText.textContent = 'Password Strength: None';
        strengthText.style.color = '#333';
      }
    }

    function updateCriteria(element, isMet) {
      if (isMet) {
        element.classList.add('met');
      } else {
        element.classList.remove('met');
      }
    }
  </script>
</body>
</html>
