<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repositories</title>
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-header: #161b22;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --bg-btn: #21262d;
            --bg-meta-border: #21262d;
            --border: #30363d;
            --text-primary: #f0f6fc;
            --text-body: #c9d1d9;
            --text-muted: #8b949e;
            --text-faint: #484f58;
            --accent: #1f6feb;
            --link: #58a6ff;
            --transition: 0.3s ease;
        }

        [data-theme="light"] {
            --bg-body: #f6f8fa;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f6f8fa;
            --bg-btn: #f3f4f6;
            --bg-meta-border: #eaecef;
            --border: #d0d7de;
            --text-primary: #1f2328;
            --text-body: #1f2328;
            --text-muted: #656d76;
            --text-faint: #8c959f;
            --accent: #0969da;
            --link: #0969da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-body);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color var(--transition);
        }

        header h1 .count {
            background: var(--accent);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 10px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-body);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, background var(--transition), color var(--transition);
        }

        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-faint); }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-btn);
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-body);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .sort-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-btn);
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn:hover { border-color: var(--text-muted); color: var(--text-body); }

        .sort-btn.active { border-color: var(--accent); color: var(--accent); }

        .theme-toggle {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-btn);
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .theme-toggle .label {
            font-size: 0.78rem;
            font-weight: 500;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
        }

        .repo-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.2s, background var(--transition);
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .repo-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .repo-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-icon {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            flex-shrink: 0;
            transition: fill var(--transition);
        }

        .repo-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--link);
            text-decoration: none;
        }

        .repo-name:hover { text-decoration: underline; }

        .repo-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            flex: 1;
        }

        .repo-meta {
            display: flex;
            gap: 16px;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--bg-meta-border);
            transition: border-color var(--transition);
        }

        .repo-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .repo-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-ai { background: #1a2332; color: #58a6ff; }
        .tag-web { background: #1a2a1a; color: #7ee787; }
        .tag-tools { background: #2a2a1a; color: #e3b341; }
        .tag-data { background: #2a1a2a; color: #d2a8ff; }
        .tag-quiz { background: #2a1a1a; color: #f78166; }
        .tag-productivity { background: #1a2a2a; color: #76e3ea; }
        .tag-security { background: #2a1a1a; color: #ffa198; }
        .tag-blog { background: #1a2a1a; color: #a5d6ff; }
        .tag-portfolio { background: #2a2a2a; color: #8b949e; }

        [data-theme="light"] .tag-ai { background: #dbeafe; color: #1d4ed8; }
        [data-theme="light"] .tag-web { background: #dcfce7; color: #15803d; }
        [data-theme="light"] .tag-tools { background: #fef9c3; color: #a16207; }
        [data-theme="light"] .tag-data { background: #f3e8ff; color: #7e22ce; }
        [data-theme="light"] .tag-quiz { background: #ffedd5; color: #c2410c; }
        [data-theme="light"] .tag-productivity { background: #cffafe; color: #0e7490; }
        [data-theme="light"] .tag-security { background: #fee2e2; color: #dc2626; }
        [data-theme="light"] .tag-blog { background: #e0f2fe; color: #0369a1; }
        [data-theme="light"] .tag-portfolio { background: #f3f4f6; color: #4b5563; }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-faint);
            font-size: 1.1rem;
        }

        .no-results .emoji { font-size: 3rem; margin-bottom: 16px; display: block; }

        .repo-count-text {
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .sun-icon, .moon-icon { display: none; }
        [data-theme="dark"] .sun-icon { display: inline; }
        [data-theme="light"] .moon-icon { display: inline; }
    </style>
</head>
<body>

<header>
    <h1>
        <svg class="repo-icon" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8.5V1.5zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.095a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>
        GitHub Repositories
        <span class="count" id="visibleCount">53</span>
    </h1>
    <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="Search repositories...">
        <div class="filters" id="filters"></div>
        <button class="sort-btn" id="sortDate" onclick="toggleSort()">↕ Newest</button>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
            <span class="sun-icon">☀️</span>
            <span class="moon-icon">🌙</span>
            <span class="label" id="themeLabel">Light</span>
        </button>
    </div>
</header>

<main>
    <div class="repo-count-text" id="countText">Showing all 53 repositories</div>
    <div class="repo-grid" id="repoGrid"></div>
    <div class="no-results" id="noResults" style="display:none">
        <span class="emoji">🔍</span>
        No repositories match your search.

    { name: "Classification", desc: "Data Science based classification", url: "https://github.com/aphadke77/Classification", created: "2019-02-09", cat: "data" },
];

const CAT_LABELS = {
    all: "All",
    ai: "AI & ML",
    web: "Web Apps",
    tools: "Tools & Utils",
    productivity: "Productivity",
    quiz: "Quiz",
    data: "Data Science",
    blog: "Blog",
    portfolio: "Portfolio",
    security: "Security",
};

let activeCategory = "all";
let sortNewest = true;

function renderFilters() {
    const container = document.getElementById("filters");
    // Count per category
    const counts = { all: REPOS.length };
    REPOS.forEach(r => { counts[r.cat] = (counts[r.cat] || 0) + 1; });

    for (const [key, label] of Object.entries(CAT_LABELS)) {
        const btn = document.createElement("button");
        btn.className = `filter-btn${key === activeCategory ? " active" : ""}`;
        btn.textContent = `${label} (${counts[key] || 0})`;
        btn.onclick = () => {
            activeCategory = key;
            renderFilters();
            renderRepos();
        };
        container.appendChild(btn);
    }
}

function renderRepos() {
    const grid = document.getElementById("repoGrid");
    const search = document.getElementById("search").value.toLowerCase();
    const noResults = document.getElementById("noResults");
    const countText = document.getElementById("countText");

    let filtered = REPOS.filter(r => {
        const matchCat = activeCategory === "all" || r.cat === activeCategory;
        const matchSearch = !search || r.name.toLowerCase().includes(search) || r.desc.toLowerCase().includes(search);
        return matchCat && matchSearch;
    });

    filtered.sort((a, b) => {
        return sortNewest
            ? new Date(b.created) - new Date(a.created)
            : new Date(a.created) - new Date(b.created);
    });

    document.getElementById("visibleCount").textContent = filtered.length;
    countText.textContent = filtered.length === REPOS.length
        ? `Showing all ${REPOS.length} repositories`
        : `Showing ${filtered.length} of ${REPOS.length} repositories`;

    grid.innerHTML = "";

    if (filtered.length === 0) {
        noResults.style.display = "block";
        return;
    }
    noResults.style.display = "none";

    filtered.forEach((r, i) => {
        const card = document.createElement("div");
        card.className = "repo-card";
        card.style.animationDelay = `${i * 0.03}s`;

        const yearsAgo = Math.floor((Date.now() - new Date(r.created)) / (365.25 * 24 * 60 * 60 * 1000));
        const ageText = yearsAgo < 1 ? "Created this year" : yearsAgo === 1 ? "Created 1 year ago" : `Created ${yearsAgo} years ago`;

        card.innerHTML = `
            <div class="repo-header">
                <svg class="repo-icon" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8.5V1.5z"/></svg>
                <a class="repo-name" href="${r.url}" target="_blank">${r.name}</a>
                <span class="repo-tag tag-${r.cat}">${CAT_LABELS[r.cat] || r.cat}</span>
            </div>
            <div class="repo-desc">${r.desc || '<em>No description</em>'}</div>
            <div class="repo-meta">
                <span>📅 ${r.created}</span>
                <span>🕐 ${ageText}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

function toggleSort() {
    sortNewest = !sortNewest;
    const btn = document.getElementById("sortDate");
    btn.textContent = sortNewest ? "↕ Newest" : "↕ Oldest";
    renderRepos();
}

document.getElementById("search").addEventListener("input", renderRepos);

function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute("data-theme");
    const next = current === "light" ? "dark" : "light";
    html.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
    document.getElementById("themeLabel").textContent = next === "light" ? "Dark" : "Light";
}

// Restore saved theme or default to dark
const savedTheme = localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
document.getElementById("themeLabel").textContent = savedTheme === "light" ? "Dark" : "Light";

renderFilters();
renderRepos();
</script>
